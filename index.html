<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 문서의 메타데이터 및 설정 영역 (브라우저 상단 탭 등에 영향) -->
    <meta charset="UTF-8">
    <title>웹사이트 제목</title>
</head>
<body>

    <!-- 1. 헤더 (Header): 로고, 내비게이션 메뉴 등 상단 영역 -->
    <header>
        <h1>우리 웹사이트 로고</h1>
        <nav>
            <ul>
                <li><a href="#">메뉴1</a></li>
                <li><a href="#">메뉴2</a></li>
            </ul>
        </nav>
    </header>

    <!-- 2. 본문 (Main): 페이지의 핵심 콘텐츠가 들어가는 영역 -->
    <main>
        <section>
            <h2>주요 내용 제목</h2>
            <p>여기에 실제 내용을 입력합니다.</p>
        </section>
    </main>

    <!-- 3. 푸터 (Footer): 저작권 정보, 연락처, 사이트 맵 등 하단 영역 -->
    <footer>
        <p>&copy; 2026 우리 회사. 모든 권리 보유.</p>
        <p>문의: email@example.com</p>
    </footer>

</body>
</html>
