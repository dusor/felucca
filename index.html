<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="울티마 온라인 t2a 지향 프리 샤드.">
    <meta name="keywords" content="t2a 순정 복원 프로젝트">
    <title>울티마 온라인 Felucca 샤드</title>
    <style>
        /* 페이지 전체 기본 설정 */
        body { margin: 0; padding: 0; font-family: sans-serif; }

        /* 헤더 영역 구분 */
        header { 
            background-color: #f8f9fa; 
            padding: 20px; 
            border-bottom: 2px solid #ddd; 
                }
            /* 추가된 부분 */
  header nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      gap: 20px;
  }
        

        /* 본문 영역 구분 */
        main { 
            padding: 20px; 
            min-height: 400px; /* 콘텐츠가 적어도 최소 높이를 유지함 */
            background-color: #ffffff; 
        }

        /* 푸터 영역 구분 */
        footer { 
            background-color: #333; 
            color: white; 
            text-align:left; 
            padding: 10px; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>
    <header>
        <h1>울티마 온라인 펠루카 샤드</h1>
        <nav>
            <ul>
                <li><a href="#">클라이언트 다운</a></li>
                <li><a href="#" target="_blank">게시판</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>[서버 안내]</h2>
            <div id="content-area">내용을 불러오는 중...</div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 비영리 내돈 내산 운영.</p>
    </footer>

<script>
  // content.txt 파일을 불러와 content-area div에 넣는 함수
  fetch('content.txt')
    .then(response => {
      if (!response.ok) {
        throw new Error('파일을 불러올 수 없습니다.');
      }
      return response.text();
    })
    .then(data => {
      document.getElementById('content-area').innerText = data;
    })
    .catch(error => {
      console.error('Error:', error);
      document.getElementById('content-area').innerText = '내용을 불러오는데 실패했습니다.';
    });
</script>




    
</body>
</html>
